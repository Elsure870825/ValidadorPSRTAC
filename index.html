<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador de Garantías PSR TAC</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .header .subtitle {
            font-size: 0.95em;
            opacity: 0.8;
        }

        .content {
            padding: 40px 30px;
        }

        .search-section {
            margin-bottom: 30px;
        }

        .search-section label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #333;
            font-size: 1.05em;
        }

        .search-container {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .search-container input {
            flex: 1;
            min-width: 200px;
            padding: 14px 18px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1.05em;
            transition: all 0.3s;
        }

        .search-container input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .search-container button {
            padding: 14px 35px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.05em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .search-container button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .search-container button:active {
            transform: translateY(0);
        }

        .search-container button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .result-section {
            display: none;
            margin-top: 30px;
            padding: 25px;
            border-radius: 10px;
            border-left: 5px solid #667eea;
            background: #f8f9ff;
        }

        .result-section.show {
            display: block;
        }

        .result-section.success {
            border-left-color: #28a745;
            background: #f0f9f4;
        }

        .result-section.error {
            border-left-color: #dc3545;
            background: #fdf3f5;
        }

        .result-section.warning {
            border-left-color: #ffc107;
            background: #fffbf0;
        }

        .result-title {
            font-size: 1.3em;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .result-section.success .result-title {
            color: #28a745;
        }

        .result-section.error .result-title {
            color: #dc3545;
        }

        .result-section.warning .result-title {
            color: #ffc107;
        }

        .result-item {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .result-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .result-item-label {
            font-weight: 600;
            color: #666;
            font-size: 0.95em;
            margin-bottom: 5px;
        }

        .result-item-value {
            font-size: 1.15em;
            color: #333;
            word-break: break-word;
        }

        .guarantee-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 1em;
            margin-top: 10px;
        }

        .guarantee-badge.active {
            background: #d4edda;
            color: #155724;
            border: 2px solid #28a745;
        }

        .guarantee-badge.expired {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #dc3545;
        }

        .days-info {
            font-size: 0.9em;
            color: #666;
            margin-top: 5px;
            font-style: italic;
        }

        .message {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            animation: slideDown 0.3s ease-out;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }

        .message.loading {
            background: #d1ecf1;
            color: #0c5460;
            border-left: 4px solid #17a2b8;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0, 0, 0, 0.1);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: #999;
            font-size: 0.9em;
            border-top: 1px solid #eee;
            margin-top: 20px;
        }

        .no-result {
            text-align: center;
            padding: 30px;
            color: #dc3545;
        }

        .no-result-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8em;
            }

            .content {
                padding: 25px 20px;
            }

            .search-container {
                flex-direction: column;
            }

            .search-container button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛡️ Validador de Garantías</h1>
            <p>PSR TAC - Sistema de Verificación</p>
            <p class="subtitle">Consulta el estado de garantía de tu recurso</p>
        </div>

        <div class="content">
            <div id="message"></div>

            <div class="search-section">
                <label for="numeroInput">Ingresa el Número de Recurso:</label>
                <div class="search-container">
                    <input 
                        type="text" 
                        id="numeroInput" 
                        placeholder="Ej: 123456"
                        onkeypress="handleKeyPress(event)"
                    >
                    <button onclick="buscar()">Buscar</button>
                </div>
            </div>

            <div id="resultSection" class="result-section">
                <div class="result-title" id="resultTitle"></div>
                <div id="resultContent"></div>
            </div>

            <div class="footer">
                <p>Datos consultados desde el registro oficial de PSR TAC</p>
            </div>
        </div>
    </div>

    <script>
        const SPREADSHEET_ID = '10qZbXp4ayXjtITenLXaj7_E2y176O7JB28k28EcmbbM';
        const SHEET_NAME = 'Sheet1';
        const API_KEY = 'AIzaSyDaProFeaturePlaceholder'; // Se puede dejar vacío para hojas públicas

        // Función para mostrar mensajes
        function mostrarMensaje(texto, tipo) {
            const messageDiv = document.getElementById('message');
            messageDiv.className = `message ${tipo} show`;
            messageDiv.textContent = texto;
            
            setTimeout(() => {
                messageDiv.classList.remove('show');
            }, 5000);
        }

        // Manejar Enter en el input
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                buscar();
            }
        }

        // Función para calcular días transcurridos
        function calcularDiasTranscurridos(fecha) {
            const fechaRegistro = new Date(fecha);
            const hoy = new Date();
            
            // Establecer horas a 00:00:00 para comparar solo fechas
            fechaRegistro.setHours(0, 0, 0, 0);
            hoy.setHours(0, 0, 0, 0);
            
            const diferencia = hoy - fechaRegistro;
            const dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));
            
            return dias;
        }

        // Función para formatear fecha
        function formatearFecha(fechaStr) {
            const fecha = new Date(fechaStr);
            return fecha.toLocaleDateString('es-ES', { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
        }

        // Función principal de búsqueda
        async function buscar() {
            const numero = document.getElementById('numeroInput').value.trim();

            if (!numero) {
                mostrarMensaje('Por favor ingresa un número de recurso', 'error');
                return;
            }

            const btnBuscar = event.target;
            btnBuscar.disabled = true;
            btnBuscar.innerHTML = '<span class="loading-spinner"></span> Buscando...';

            mostrarMensaje('Consultando base de datos...', 'loading');

            try {
                // Obtener datos del Google Sheet
                const range = `${SHEET_NAME}!A:D`;
                const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(range)}`;

                const response = await fetch(url);

                if (!response.ok) {
                    throw new Error('Error al conectar con la base de datos');
                }

                const data = await response.json();
                const rows = data.values || [];

                if (rows.length === 0) {
                    throw new Error('La base de datos está vacía');
                }

                // Buscar el registro
                const resultado = buscarEnDatos(numero, rows);

                if (resultado) {
                    mostrarResultado(resultado);
                    mostrarMensaje('✅ Búsqueda completada', 'success');
                } else {
                    mostrarNoEncontrado(numero);
                    mostrarMensaje('❌ No se encontró el número solicitado', 'error');
                }

            } catch (error) {
                console.error('Error:', error);
                mostrarMensaje(`Error: ${error.message}`, 'error');
            } finally {
                btnBuscar.disabled = false;
                btnBuscar.textContent = 'Buscar';
            }
        }

        // Función para buscar en los datos
        function buscarEnDatos(numero, rows) {
            // Saltar encabezado si existe
            const startIndex = rows[0]?.includes('Número') ? 1 : 0;

            for (let i = startIndex; i < rows.length; i++) {
                const fila = rows[i];
                if (!fila || fila.length === 0) continue;

                // Buscar en la primera columna (Número)
                if (String(fila[0]).trim() === numero) {
                    return {
                        numero: fila[0],
                        recurso: fila[1],
                        fecha: fila[2],
                        mensaje: fila[3]
                    };
                }
            }

            return null;
        }

        // Función para mostrar resultado
        function mostrarResultado(resultado) {
            const resultSection = document.getElementById('resultSection');
            const diasTranscurridos = calcularDiasTranscurridos(resultado.fecha);
            const enGarantia = diasTranscurridos <= 60;
            const fechaFormato = formatearFecha(resultado.fecha);

            // Determinar tipo de resultado
            let tipoResultado = enGarantia ? 'success' : 'warning';
            let icon = enGarantia ? '✅' : '⚠️';

            resultSection.className = `result-section show ${tipoResultado}`;

            const titulo = enGarantia 
                ? 'En Garantía' 
                : 'Fuera de Garantía';

            let contenidoHtml = `
                <div class="result-item">
                    <div class="result-item-label">Número de Recurso</div>
                    <div class="result-item-value">${resultado.numero}</div>
                </div>

                <div class="result-item">
                    <div class="result-item-label">Recurso</div>
                    <div class="result-item-value">${resultado.recurso}</div>
                </div>

                <div class="result-item">
                    <div class="result-item-label">Fecha de Registro</div>
                    <div class="result-item-value">${fechaFormato}</div>
                    <div class="days-info">Días transcurridos: ${diasTranscurridos}</div>
                </div>

                <div class="result-item">
                    <div class="result-item-label">Estado de Garantía</div>
                    <div>
                        <span class="guarantee-badge ${enGarantia ? 'active' : 'expired'}">
                            ${enGarantia ? '✓ EN GARANTÍA' : '✗ FUERA DE GARANTÍA'}
                        </span>
                        <div class="days-info">
                            ${enGarantia 
                                ? `Días restantes: ${60 - diasTranscurridos}` 
                                : `Vencida hace ${diasTranscurridos - 60} días`
                            }
                        </div>
                    </div>
                </div>

                <div class="result-item">
                    <div class="result-item-label">Mensaje</div>
                    <div class="result-item-value">${resultado.mensaje || 'N/A'}</div>
                </div>

                ${enGarantia 
                    ? '<div class="result-item"><div class="result-item-value" style="color: #28a745; font-weight: 600;">✓ El producto está dentro del período de garantía de 60 días naturales</div></div>'
                    : '<div class="result-item"><div class="result-item-value" style="color: #dc3545; font-weight: 600;">✗ El producto ha superado el período de garantía de 60 días naturales</div></div>'
                }
            `;

            document.getElementById('resultTitle').innerHTML = `${icon} ${titulo}`;
            document.getElementById('resultContent').innerHTML = contenidoHtml;
        }

        // Función para mostrar no encontrado
        function mostrarNoEncontrado(numero) {
            const resultSection = document.getElementById('resultSection');
            resultSection.className = 'result-section show error';
            document.getElementById('resultTitle').innerHTML = '❌ No Encontrado';
            document.getElementById('resultContent').innerHTML = `
                <div class="no-result">
                    <div class="no-result-icon">🔍</div>
                    <p>No se encontró ningún recurso con el número: <strong>${numero}</strong></p>
                    <p style="margin-top: 10px; font-size: 0.9em;">Por favor verifica que el número sea correcto e intenta de nuevo.</p>
                </div>
            `;
        }

        // Enfocar en el input al cargar
        window.addEventListener('load', () => {
            document.getElementById('numeroInput').focus();
        });
    </script>
</body>
</html>
